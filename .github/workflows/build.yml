name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject Secrets
        run: |
          # Replace the SpaceX API URL in environment.ts if needed
           sed -i "s|'https://api.spacexdata.com/latest'|'${{ secrets.SPACEX_API_URL }}'|g" src/environment/environment.ts

      - name: Build
        run: npm run production

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
